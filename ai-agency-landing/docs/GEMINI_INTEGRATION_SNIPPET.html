<!-- ══════════════════════════════════════════════════════════
     FETCH DIRECTO — Para frontends custom / SPA
     Cómo enviar mensajes manualmente a la Edge Function
     ══════════════════════════════════════════════════════════ -->
<script>
// Estado de conversación (se mantiene en memoria del cliente)
var conversationHistory = [];
var GEMINI_ENDPOINT = 'https://hmnbbzpucefcldziwrvs.supabase.co/functions/v1/gemini-agent';

/**
 * sendToGeminiAgent(message) → Promise<{ text, history, toolExecuted? }>
 * 
 * Envía un mensaje al agente Nova y devuelve la respuesta.
 * El historial se actualiza automáticamente para multi-turn.
 */
async function sendToGeminiAgent(userMessage) {
  const payload = {
    userMessage: userMessage,        // string: texto del usuario
    history: conversationHistory,    // array: historial previo (roles user/model)
    context: {                       // object: datos del cliente embebido
      companyName: 'Mi Empresa SpA',
      agentName: 'Nova',
      whatsapp: '+56912345678'
    }
  };

  const response = await fetch(GEMINI_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    throw new Error(`HTTP ${response.status}`);
  }

  const data = await response.json();
  // Formato respuesta: { text, history, toolExecuted?, toolResult? }

  // Actualizar historial para el próximo turno (multi-turn conversation)
  if (Array.isArray(data.history)) {
    conversationHistory = data.history;
  }

  return data;
}
