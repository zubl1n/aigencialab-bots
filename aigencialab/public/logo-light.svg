<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <!-- Soft Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#9333ea" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Icon Box -->
  <rect x="10" y="15" width="66" height="50" rx="14" fill="url(#brand)" filter="url(#glow)" />
  
  <!-- "AI" Text inside the purple box -->
  <text x="43" y="50" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">AI</text>
  
  <!-- "genciaLab" Text -->
  <text x="79" y="50" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="34" fill="#0f172a" letter-spacing="-1">genciaLab</text>
</svg>
